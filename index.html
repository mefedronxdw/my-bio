<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mefedronxdw</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  overflow: hidden;
  position: relative;
  background: black;
  padding-bottom: env(safe-area-inset-bottom);
  cursor: none;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('background.jpg') center/cover no-repeat;
  z-index: -1;
}


#trail { position: fixed; inset: 0; z-index: 9990; pointer-events: none; }
.cur {
  position: fixed; z-index: 9999; pointer-events: none;
  width: 10px; height: 10px; border-radius: 50%;
  background: white;
  box-shadow: 0 0 12px 3px rgba(255,255,255,.7);
  transform: translate(-50%,-50%);
}
.cur-ring {
  position: fixed; z-index: 9998; pointer-events: none;
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,.45);
  transform: translate(-50%,-50%);
  transition: left .12s ease, top .12s ease;
}


.card {
  position: relative; z-index: 10;
  width: 350px; padding: 28px 24px 24px;
  border-radius: 24px;
  background: rgba(0,0,0,.52);
  backdrop-filter: blur(32px);
  border: 1px solid rgba(255,255,255,.1);
  box-shadow: 0 0 0 1px rgba(255,255,255,.04), 0 28px 70px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.08);
  text-align: center;
  animation: cardIn .8s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(.96)} to{opacity:1;transform:none} }


.av-wrap { position: relative; width: 116px; height: 116px; margin: 0 auto 14px; }
.av-pulse {
  position: absolute; inset: -12px; border-radius: 50%; z-index: -1;
  background: radial-gradient(circle, rgba(255,255,255,.18) 0%, transparent 65%);
  animation: avp 3.5s ease-in-out infinite;
}
@keyframes avp { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.16);opacity:.9} }
.av-ring {
  position: absolute; inset: -4px; border-radius: 50%; z-index: 0;
  background: conic-gradient(
    rgba(255,255,255,0) 0deg, rgba(255,255,255,.9) 90deg,
    rgba(255,255,255,.3) 180deg, rgba(255,255,255,.9) 270deg,
    rgba(255,255,255,0) 360deg
  );
  animation: spin 5s linear infinite;
}
.av-ring::after { content:''; position:absolute; inset:3px; border-radius:50%; background:#000; }
@keyframes spin { to{transform:rotate(360deg)} }
.av-box { position:relative; z-index:1; width:116px; height:116px; border-radius:50%; overflow:hidden; }
.av-box video, .av-box img { width:100%; height:100%; object-fit:cover; display:block; }


.name {
  font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px;
  color: #fff; line-height: 1; margin-bottom: 3px;
  text-shadow: 0 0 30px rgba(255,255,255,.25);
  animation: cardIn .8s .07s both;
}
.quote { font-size: 13px; color: rgba(255,255,255,.38); margin-bottom: 3px; letter-spacing: 6px; font-weight: 300; animation: cardIn .8s .11s both; }
.subtitle { font-size: 10px; color: rgba(255,255,255,.22); margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; animation: cardIn .8s .15s both; }


.socials { display:flex; justify-content:center; gap:10px; margin-bottom:16px; animation: cardIn .8s .19s both; }
.socials a {
  width:42px; height:42px; display:flex; align-items:center; justify-content:center;
  border-radius:12px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.55); font-size:17px; text-decoration:none; transition:all .25s;
  position:relative; overflow:hidden;
}
.socials a::before { content:''; position:absolute; inset:0; background:rgba(255,255,255,.1); opacity:0; transition:opacity .25s; }
.socials a i { position:relative; z-index:1; }
.socials a:hover { transform:translateY(-3px) scale(1.08); border-color:rgba(255,255,255,.3); color:white; }
.socials a:hover::before { opacity:1; }


.links { display:flex; flex-direction:column; gap:7px; margin-bottom:18px; animation: cardIn .8s .23s both; }
.link {
  display:flex; align-items:center; gap:11px;
  padding:12px 14px; border-radius:12px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
  text-decoration:none; color:rgba(255,255,255,.75); font-weight:700; font-size:14px;
  transition:all .25s; position:relative; overflow:hidden;
}
.link::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:rgba(255,255,255,.5); }
.link-txt { flex:1; text-align:left; }
.link-arr { font-size:10px; opacity:.3; transition:all .25s; }
.link-ico { font-size:14px; opacity:.45; width:16px; text-align:center; }
.link:hover { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.2); transform:translateX(4px); color:#fff; }
.link:hover .link-arr { opacity:.8; transform:translateX(3px); }


.div { height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent); margin-bottom:15px; }


.player { animation: cardIn .8s .27s both; }
.np-label { font-size:9px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.25); margin-bottom:8px; }
.np-label span { color:rgba(255,255,255,.6); font-weight:700; }
.player-box { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07); border-radius:13px; padding:12px 13px; }
.player-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.play-btn {
  width:40px; height:40px; border-radius:50%; border:1px solid rgba(255,255,255,.25); flex-shrink:0;
  background:rgba(255,255,255,.15); color:white; font-size:14px; cursor:none;
  display:flex; align-items:center; justify-content:center; transition:all .2s;
}
.play-btn:hover { background:rgba(255,255,255,.25); box-shadow:0 0 20px rgba(255,255,255,.3); transform:scale(1.08); }
.play-btn:active { transform:scale(.95); }
.pinfo { flex:1; text-align:left; min-width:0; }
.tname { font-size:12px; font-weight:700; color:rgba(255,255,255,.85); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.ttime { font-size:10px; color:rgba(255,255,255,.28); font-family:monospace; letter-spacing:1px; }
.viz { display:flex; align-items:flex-end; gap:2px; height:20px; flex-shrink:0; }
.vb { width:3px; border-radius:2px; background:rgba(255,255,255,.5); height:3px; }
.vb.on { animation:vbar var(--d,.6s) ease-in-out infinite alternate; }
@keyframes vbar { from{height:3px} to{height:var(--h,18px);background:rgba(255,255,255,.9);} }
.prog { width:100%; height:3px; background:rgba(255,255,255,.1); border-radius:2px; cursor:none; position:relative; }
.prog-f { height:100%; border-radius:2px; background:rgba(255,255,255,.7); width:0%; transition:width .1s linear; position:relative; }
.prog-f::after {
  content:''; position:absolute; right:-5px; top:50%; transform:translateY(-50%);
  width:9px; height:9px; border-radius:50%; background:white;
  box-shadow:0 0 8px rgba(255,255,255,.8); opacity:0; transition:opacity .2s;
}
.prog:hover .prog-f::after { opacity:1; }
</style>
</head>
<body>

<canvas id="trail"></canvas>
<div class="cur" id="cur"></div>
<div class="cur-ring" id="curRing"></div>

<div class="card">

  <div class="av-wrap">
    <div class="av-pulse"></div>
    <div class="av-ring"></div>
    <div class="av-box">
      <video autoplay muted loop playsinline>
        <source src="avatar.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <div class="name">Mefedronxdw</div>
  <div class="quote">悪人正機。</div>
  <div class="subtitle">my links ✨</div>

  <div class="socials">
    <a href="https://www.tiktok.com/@mefedronxdw" target="_blank"><i class="fab fa-tiktok"></i></a>
    <a href="https://discord.com/users/mefedronxdw" target="_blank"><i class="fab fa-discord"></i></a>
  </div>

  <div class="links">
    <a class="link" href="https://www.tiktok.com/@mefedronxdw" target="_blank">
      <i class="fab fa-tiktok link-ico"></i>
      <span class="link-txt">TikTok</span>
      <i class="fas fa-arrow-right link-arr"></i>
    </a>
    <a class="link" href="https://discord.com/users/mefedronxdw" target="_blank">
      <i class="fab fa-discord link-ico"></i>
      <span class="link-txt">Discord</span>
      <i class="fas fa-arrow-right link-arr"></i>
    </a>
  </div>

  <div class="div"></div>

  <div class="player">
    <div class="np-label">Now playing <span>♪</span></div>
    <div class="player-box">
      <div class="player-row">
        <button class="play-btn" id="playBtn" onclick="togglePlay()">
          <i class="fas fa-play" id="playIco"></i>
        </button>
        <div class="pinfo">
          <div class="tname">♪ &nbsp;now playing...</div>
          <div class="ttime"><span id="cur2">0:00</span> / <span id="dur">0:00</span></div>
        </div>
        <div class="viz">
          <div class="vb" style="--h:6px;--d:.5s"></div>
          <div class="vb" style="--h:16px;--d:.7s"></div>
          <div class="vb" style="--h:10px;--d:.4s"></div>
          <div class="vb" style="--h:18px;--d:.6s"></div>
          <div class="vb" style="--h:13px;--d:.8s"></div>
          <div class="vb" style="--h:18px;--d:.5s"></div>
          <div class="vb" style="--h:8px;--d:.65s"></div>
        </div>
      </div>
      <div class="prog" id="prog">
        <div class="prog-f" id="pf"></div>
      </div>
    </div>
  </div>

</div>

<audio id="audio"><source src="music.mp3" type="audio/mpeg"></audio>

<script>
const audio = document.getElementById('audio');
const playIco = document.getElementById('playIco');
const pf = document.getElementById('pf');
const cur2 = document.getElementById('cur2');
const durEl = document.getElementById('dur');
const prog = document.getElementById('prog');
const vbars = document.querySelectorAll('.vb');
let playing = false;

function fmt(s) { if(isNaN(s))return'0:00'; return`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }
function togglePlay() {
  if(playing){ audio.pause(); playIco.className='fas fa-play'; vbars.forEach(b=>b.classList.remove('on')); playing=false; }
  else{ audio.play().catch(()=>{}); playIco.className='fas fa-pause'; vbars.forEach(b=>b.classList.add('on')); playing=true; }
}
audio.addEventListener('loadedmetadata', ()=> durEl.textContent = fmt(audio.duration));
audio.addEventListener('timeupdate', ()=>{
  if(!audio.duration)return;
  pf.style.width=`${(audio.currentTime/audio.duration)*100}%`;
  cur2.textContent=fmt(audio.currentTime);
});
audio.addEventListener('ended', ()=>{ playIco.className='fas fa-play'; vbars.forEach(b=>b.classList.remove('on')); playing=false; pf.style.width='0%'; });
prog.addEventListener('click', e=>{ const r=prog.getBoundingClientRect(); audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration; });

const canvas = document.getElementById('trail');
const ctx = canvas.getContext('2d');
const curDot = document.getElementById('cur');
const curRing = document.getElementById('curRing');
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resize(); window.addEventListener('resize', resize);

let mx=-200, my=-200, rx=-200, ry=-200;
const TRAIL_LEN = 28;
const trail = Array.from({length:TRAIL_LEN}, ()=>({x:-200,y:-200}));
document.addEventListener('mousemove', e=>{ mx=e.clientX; my=e.clientY; });
document.querySelectorAll('a,button').forEach(el=>el.style.cursor='none');

function drawTrail() {
  for(let i=TRAIL_LEN-1;i>0;i--){ trail[i].x=trail[i-1].x; trail[i].y=trail[i-1].y; }
  trail[0].x=mx; trail[0].y=my;
  rx+=(mx-rx)*0.14; ry+=(my-ry)*0.14;
  curDot.style.left=mx+'px'; curDot.style.top=my+'px';
  curRing.style.left=rx+'px'; curRing.style.top=ry+'px';
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=1;i<TRAIL_LEN;i++){
    const t=trail[i],tp=trail[i-1];
    const p=1-i/TRAIL_LEN;
    ctx.beginPath(); ctx.moveTo(tp.x,tp.y); ctx.lineTo(t.x,t.y);
    ctx.strokeStyle=`rgba(255,255,255,${p*p*0.55})`; ctx.lineWidth=p*4+0.5; ctx.lineCap='round'; ctx.stroke();
  }
  for(let i=0;i<TRAIL_LEN;i+=4){
    const p=trail[i], pr=1-i/TRAIL_LEN;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,pr*9);
    g.addColorStop(0,`rgba(255,255,255,${pr*0.4})`); g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(p.x,p.y,pr*9,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  }
  requestAnimationFrame(drawTrail);
}
drawTrail();

const card=document.querySelector('.card');
const rs=document.createElement('style');
rs.textContent='@keyframes rip{to{width:320px;height:320px;opacity:0}}';
document.head.appendChild(rs);
card.addEventListener('click',function(e){
  const r=this.getBoundingClientRect();
  const rip=document.createElement('div');
  rip.style.cssText=`position:absolute;left:${e.clientX-r.left}px;top:${e.clientY-r.top}px;width:0;height:0;border-radius:50%;background:rgba(255,255,255,.07);transform:translate(-50%,-50%);pointer-events:none;z-index:0;animation:rip .5s ease-out forwards;`;
  this.appendChild(rip); setTimeout(()=>rip.remove(),500);
});
</script>
</body>
</html>
